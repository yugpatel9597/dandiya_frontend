services:
  # Backend API Service
  - type: web
    name: dandiyakart-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        fromService:
          type: web
          name: dandiyakart-client
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend React App
  - type: web
    name: dandiyakart-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: dandiyakart-server
          envVarKey: RENDER_EXTERNAL_URL
